stages:
  - test
  - build
  - package
  - publish
  - deploy

variables:
  SERVER_TARGET: "x86_64-unknown-linux-musl"
  SYSEXT_ID: "pnas-server"
  OS_ID: "fedora"
  OS_VERSION_ID: "40"
  VERSION: "${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
  ARTIFACT_BIN: "target/${SERVER_TARGET}/release/pnas-server"
  ARTIFACT_RAW: "dist/pnas-server-v${VERSION}.raw"
  ORAS_ARTIFACT_TYPE: "application/vnd.pnas.sysext"
  ORAS_BLOB_TYPE: "application/vnd.pnas.sysext.raw"
  HARBOR_REGISTRY: "harbor.pandamicro.com"
  HARBOR_NAMESPACE: "phs"
  HARBOR_REPO: "${HARBOR_NAMESPACE}/${SYSEXT_ID}"

test:cargo:
  stage: test
  image: harbor.pandamicro.com/phs/ci-rust-nasserver:1.87
  script:
    - cargo --version
    - cargo check

build:musl:
  stage: build
  image: harbor.pandamicro.com/phs/ci-rust-nasserver:1.87
  before_script:
    - rustup target add "${SERVER_TARGET}"
  script:
    - cargo build --release --target "${SERVER_TARGET}"
  artifacts:
    paths:
      - ${ARTIFACT_BIN}
    expire_in: 7 days

package:sysext:
  stage: package
  image: harbor.pandamicro.com/phs/ci-rust-nasserver:1.87
  needs:
    - job: build:musl
  variables:
    DIST_DIR: "dist"
    BUILD_ROOT: "build_root"
  before_script:
    - mkdir -p "${DIST_DIR}" "${BUILD_ROOT}/usr/bin" "${BUILD_ROOT}/usr/lib/systemd/system" "${BUILD_ROOT}/usr/lib/extension-release.d"
  script:
    - cp "${ARTIFACT_BIN}" "${BUILD_ROOT}/usr/bin/pnas-server"
    - cp packaging/pnas-server.service "${BUILD_ROOT}/usr/lib/systemd/system/pnas-server.service"
    - printf "ID=%s\nVERSION_ID=%s\nSYSEXT_ID=%s\n" "${OS_ID}" "${OS_VERSION_ID}" "${SYSEXT_ID}" > "${BUILD_ROOT}/usr/lib/extension-release.d/extension-release.${SYSEXT_ID}"
    - mksquashfs "${BUILD_ROOT}" "${ARTIFACT_RAW}" -noappend -comp xz -b 1048576 -Xdict-size 1048576
  artifacts:
    paths:
      - ${ARTIFACT_RAW}
    expire_in: 14 days

publish:oras:
  stage: publish
  image: harbor.pandamicro.com/phs/ci-rust-nasserver:1.87
  needs:
    - job: package:sysext
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - if [ -f /run/secrets/harbor/username ]; then export HARBOR_USERNAME="$(cat /run/secrets/harbor/username)"; fi
    - if [ -f /run/secrets/harbor/password ]; then export HARBOR_PASSWORD="$(cat /run/secrets/harbor/password)"; fi
    - oras login "${HARBOR_REGISTRY}" -u "${HARBOR_USERNAME}" -p "${HARBOR_PASSWORD}"
    - oras push "${HARBOR_REGISTRY}/${HARBOR_REPO}:v${VERSION}" --artifact-type "${ORAS_ARTIFACT_TYPE}" "${ARTIFACT_RAW}:${ORAS_BLOB_TYPE}" --annotation org.opencontainers.image.title="${SYSEXT_ID}-v${VERSION}.raw" --annotation org.opencontainers.image.version="${VERSION}"